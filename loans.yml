server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:loansdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  name: loans-microservice
  version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
